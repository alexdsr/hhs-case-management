<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      lang="en">

<ui:composition template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="pageTitle">Staff Login</ui:define>

    <ui:define name="content">
        <div class="login-wrapper">
            <div class="login-box">

                <h1>Staff Sign In</h1>

                <h:messages globalOnly="true" styleClass="alert alert-error"
                            role="alert" aria-live="assertive" />

                <h:form id="loginForm" aria-label="Staff login form">

                    <div class="form-group mb-2">
                        <label for="email">
                            Email Address <span class="required" aria-hidden="true">*</span>
                        </label>
                        <h:inputText id="email"
                                     value="#{loginBean.email}"
                                     required="true"
                                     requiredMessage="Email address is required."
                                     validatorMessage="Please enter a valid email address."
                                     autocomplete="username email"
                                     aria-required="true"
                                     aria-describedby="email-error" />
                        <h:message for="email" styleClass="field-error" id="email-error" role="alert" />
                    </div>

                    <div class="form-group mb-2">
                        <label for="password">
                            Password <span class="required" aria-hidden="true">*</span>
                        </label>
                        <h:inputSecret id="password"
                                       value="#{loginBean.password}"
                                       required="true"
                                       requiredMessage="Password is required."
                                       autocomplete="current-password"
                                       aria-required="true"
                                       aria-describedby="password-error"
                                       redisplay="false" />
                        <h:message for="password" styleClass="field-error" id="password-error" role="alert" />
                    </div>

                    <div class="mt-3">
                        <h:commandButton value="Sign In"
                                         action="#{loginBean.login}"
                                         styleClass="btn btn-primary"
                                         style="width:100%;" />
                    </div>

                </h:form>

                <!-- Demo credentials notice — remove before production -->
                <div class="alert alert-info mt-2" role="note" aria-label="Demo credentials">
                    <strong>Demo accounts:</strong><br />
                    Admin: admin@hhs.gov / Admin1234!<br />
                    Caseworker: caseworker@hhs.gov / Case1234!
                </div>

            </div>
        </div>
    </ui:define>

</ui:composition>
</html>
